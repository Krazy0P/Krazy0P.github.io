<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Krazy</title>
    <link rel="icon" type="image/svg+xml" href="/bots.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Monofett&display=swap"
      rel="stylesheet"
    />
  </head>

  <style>
    :root {
      color-scheme: dark;
      background-color: #000000;
      font-family: "JetBrains Mono", monospace;
      max-width: 80ch;
    }
    p,
    a {
      color: #f5e0dc;
    }
    .term-profile {
      color: #eebebe;
    }
    .directory,
    .command {
      color: #b4befe;
    }
    .dollar {
      color: #89b4fa;
    }
    .typing-command {
      display:inline-flex;
      width: 30ch;
      animation: typing 1s steps(16);
      white-space: nowrap;
      overflow: hidden;
    }
    .boom {
      animation: fade 1.50s;
    }
    .flex {
      display: flex;
    }

    @keyframes typing {
      0% {
        width: 0;
      }
      100% {
        width: 16ch;
      }
    }
    @keyframes fade {
      0% {
        opacity: 0;
      }
      75% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }
  </style>

  <body>
    <span class="">
        <span class="term-profile">krazy@potato</span>:<span class="directory"
          >~</span
        ><span class="dollar">$</span>
        <span class="command typing-command">cat whoami.txt</span>
      </span>
    <div class="boom">
      <p>I'm a student who codes for fun mostly with JavaScript.</p>
      <span>
        <span class="term-profile">krazy@potato</span>:<span class="directory"
          >~</span
        ><span class="dollar">$</span>
        <span class="command">cd contacts</span>
      </span>
      <br />
      <span>
        <span class="term-profile">krazy@potato</span>:<span class="directory"
          >~/contacts</span
        ><span class="dollar">$</span>
        <span class="command">cat contacts.txt</span>
      </span>
      <p>
        - Email:
        <a href="mailto:i_dont_have_a_custom_domain@for.real" target="_blank"
          >haha@lmao.ded</a
        >
        <br />
        - GitHub:
        <a href="https://github.com/Krazy0P" target="_blank"
          >github.com/Krazy0P</a
        >
      </p>
    </div>
  </body>
</html>
